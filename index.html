<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mountain Bike Rider</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #5abaff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.28);
    }
    #keys {
      color: #446; font-size: 12px; margin-top: 8px; letter-spacing: .3px;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="keys">↑ Pedal &nbsp;·&nbsp; ↓ Reverse &nbsp;·&nbsp; ← Lean Back &nbsp;·&nbsp; → Lean Forward</div>
<script>
// ─────────────────────────────────────────────────────────────────────────────
//  POLYFILL – roundRect
// ─────────────────────────────────────────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, radii) {
    let tl, tr, br, bl;
    if (Array.isArray(radii)) { [tl=0,tr=tl,br=tl,bl=tr]=radii; }
    else { tl=tr=br=bl=(radii||0); }
    const mn = (v) => Math.min(v, w/2, h/2);
    tl=mn(tl); tr=mn(tr); br=mn(br); bl=mn(bl);
    this.beginPath();
    this.moveTo(x+tl,y);
    this.lineTo(x+w-tr,y);      this.arcTo(x+w,y,    x+w,y+h,  tr);
    this.lineTo(x+w,y+h-br);    this.arcTo(x+w,y+h,  x,  y+h,  br);
    this.lineTo(x+bl,y+h);      this.arcTo(x,  y+h,  x,  y,    bl);
    this.lineTo(x,y+tl);        this.arcTo(x,  y,    x+w,y,    tl);
    this.closePath();
    return this;
  };
}

// ─────────────────────────────────────────────────────────────────────────────
//  CANVAS
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = Math.min(window.innerWidth  - 4,  1280);
  canvas.height = Math.min(window.innerHeight - 48, 720);
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────
const G            = 0.52;
const WHEEL_R      = 14;
const AXLE_DIST    = 58;
const DRIVE_F      = 0.50;
const BACK_F       = 0.20;
const LEAN_T       = 0.055;
const GROUND_FRIC  = 0.984;
const AIR_DRAG     = 0.9995;
const MAX_SPD      = 22;
const BOOST_SPD    = 32;
const BOOST_DUR    = 80;
const SUBSTEPS     = 5;
const RESTITUTION  = 0.08;

const ENERGY_MAX     = 100;
const ENERGY_DRAIN   = 0.038;
const BOX_INTERVAL_M = 100;
const M_PER_PX       = 0.1;
const CHUNK_W        = 900;

// ─────────────────────────────────────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────────────────────────────────────
const K = {};
window.addEventListener('keydown', e => { K[e.code] = true;  e.preventDefault(); });
window.addEventListener('keyup',   e => { K[e.code] = false; });

// ─────────────────────────────────────────────────────────────────────────────
//  DETERMINISTIC NOISE
// ─────────────────────────────────────────────────────────────────────────────
function seededRand(n) {
  const x = Math.sin(n * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}
function noisy(x, seed) {
  return Math.sin(x * 0.008  + seed)        * 65
       + Math.sin(x * 0.021  + seed * 1.7)  * 30
       + Math.sin(x * 0.055  + seed * 3.3)  * 12
       + Math.sin(x * 0.14   + seed * 5.1)  * 5;
}

// ─────────────────────────────────────────────────────────────────────────────
//  TERRAIN + DECORATIONS
// ─────────────────────────────────────────────────────────────────────────────
let terrPts = [];
let chunks  = [];
let ramps   = [];
let ebox    = [];
let trees   = [];   // {x, h, thick}
let rocks   = [];   // {x, w, h}

function smoothTerrain(pts, passes) {
  for (let p = 0; p < passes; p++)
    for (let i = 1; i < pts.length - 1; i++)
      pts[i].y = (pts[i-1].y + pts[i].y*2 + pts[i+1].y) / 4;
}

function genChunk(startX, seed) {
  const BASE = canvas.height * 0.58;
  const endX = startX + CHUNK_W;
  const pts  = [];

  for (let x = startX; x <= endX; x += 10) {
    let y = BASE + noisy(x, seed);
    y = Math.min(y, canvas.height * 0.85);
    y = Math.max(y, canvas.height * 0.26);
    pts.push({ x, y });
  }
  smoothTerrain(pts, 3);

  if (terrPts.length > 0) {
    const lastY = terrPts[terrPts.length - 1].y;
    const blend = 30;
    for (let i = 0; i < Math.min(blend, pts.length); i++) {
      const t  = i / blend;
      pts[i].y = lastY * (1 - t) + pts[i].y * t;
    }
  }
  terrPts.push(...pts);
  chunks.push(endX);

  // Speed ramp (~35% chance per chunk)
  if (seededRand(seed * 7) < 0.35) {
    const rs = seededRand(seed * 17);
    ramps.push({
      x:      startX + 150 + rs * (CHUNK_W - 300),
      width:  65 + seededRand(seed * 3) * 50,
      height: 28 + seededRand(seed)     * 18,
      type:   'speed'
    });
  }

  // Trees
  let tx = startX + 40;
  while (tx < endX - 40) {
    if (seededRand(seed + tx * 0.01) > 0.38) {
      trees.push({
        x:     tx,
        h:     32 + seededRand(seed + tx * 0.007) * 28,
        thick: 14 + seededRand(seed + tx * 0.011) * 10
      });
    }
    tx += 55 + seededRand(seed + tx * 0.003) * 60;
  }

  // Rocks
  let rx = startX + 60;
  while (rx < endX - 60) {
    if (seededRand(seed + rx * 0.013) > 0.55) {
      rocks.push({
        x: rx,
        w: 9  + seededRand(seed + rx * 0.02) * 14,
        h: 6  + seededRand(seed + rx * 0.03) * 9
      });
    }
    rx += 85 + seededRand(seed + rx * 0.005) * 110;
  }
}

let _seed = 1;
function initTerrain() {
  terrPts=[]; chunks=[]; ramps=[]; ebox=[]; trees=[]; rocks=[]; _seed=1;
  const BASE = canvas.height * 0.58;
  for (let x = -300; x <= 350; x += 10) terrPts.push({ x, y: BASE });
  for (let i = 0; i < 7; i++) genChunk(350 + i * CHUNK_W, ++_seed);
  seedBoxes();
}

function seedBoxes() {
  for (let d = 1; d <= 120; d++) {
    const wx = (d * BOX_INTERVAL_M) / M_PER_PX;
    if (!ebox.find(b => b.wx === wx)) ebox.push({ wx, collected: false });
  }
}

function extendTerrain(camX) {
  const last = chunks[chunks.length - 1] || 0;
  if (camX + canvas.width + CHUNK_W > last) { genChunk(last, ++_seed); seedBoxes(); }
  const cutoff = camX - CHUNK_W * 1.5;
  let lo = 0;
  while (lo < terrPts.length - 2 && terrPts[lo+1].x < cutoff) lo++;
  if (lo > 200) terrPts.splice(0, lo);
}

function getTerrainY(wx) {
  if (terrPts.length < 2) return canvas.height * 0.58;
  let lo = 0, hi = terrPts.length - 1;
  if (wx <= terrPts[0].x)  return terrPts[0].y;
  if (wx >= terrPts[hi].x) return terrPts[hi].y;
  while (hi - lo > 1) { const m=(lo+hi)>>1; if(terrPts[m].x<=wx) lo=m; else hi=m; }
  const t = (wx - terrPts[lo].x) / (terrPts[hi].x - terrPts[lo].x);
  return terrPts[lo].y + t * (terrPts[hi].y - terrPts[lo].y);
}
function getTerrainAngle(wx) {
  return Math.atan2(getTerrainY(wx+8) - getTerrainY(wx-8), 16);
}
function rampY(r, wx) {
  if (wx < r.x || wx > r.x + r.width) return null;
  const t = (wx - r.x) / r.width;
  const h = t < 0.65 ? (t/0.65)*r.height : ((1-t)/0.35)*r.height;
  return getTerrainY(wx) - h;
}
function groundY(wx) {
  let y = getTerrainY(wx);
  for (const r of ramps) { const ry=rampY(r,wx); if(ry!==null && ry<y) y=ry; }
  return y;
}

// ─────────────────────────────────────────────────────────────────────────────
//  BIKE PHYSICS  (two-wheel Verlet)
// ─────────────────────────────────────────────────────────────────────────────
let fw, rw, boostFrames=0, crashed=false, deadFrames=0;

function initBike() {
  const sx=90, sy=getTerrainY(sx)-WHEEL_R;
  fw={x:sx+AXLE_DIST/2, y:sy, vx:0, vy:0, onGround:false, spin:0};
  rw={x:sx-AXLE_DIST/2, y:sy, vx:0, vy:0, onGround:false, spin:0};
  boostFrames=0; crashed=false; deadFrames=0;
}
function bikeAngle()  { return Math.atan2(fw.y-rw.y, fw.x-rw.x); }
function bikeCenterX(){ return (fw.x+rw.x)/2; }
function bikeCenterY(){ return (fw.y+rw.y)/2; }

function constrainAxle() {
  const dx=fw.x-rw.x, dy=fw.y-rw.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<1e-6) return;
  const nx=dx/dist, ny=dy/dist, cor=(dist-AXLE_DIST)*0.5;
  fw.x-=nx*cor; fw.y-=ny*cor; rw.x+=nx*cor; rw.y+=ny*cor;
  const rv=(fw.vx-rw.vx)*nx+(fw.vy-rw.vy)*ny;
  fw.vx-=rv*0.5*nx; fw.vy-=rv*0.5*ny; rw.vx+=rv*0.5*nx; rw.vy+=rv*0.5*ny;
}
function resolveWheel(w) {
  const gy=groundY(w.x)-WHEEL_R; w.onGround=false;
  if(w.y>=gy){
    w.y=gy;
    const ta=getTerrainAngle(w.x), nx=Math.sin(ta), ny=-Math.cos(ta);
    const vn=w.vx*nx+w.vy*ny;
    if(vn<0){ w.vx-=(1+RESTITUTION)*vn*nx; w.vy-=(1+RESTITUTION)*vn*ny; }
    w.onGround=true;
  }
}
function stepPhysics() {
  const goF=K['ArrowUp'],goB=K['ArrowDown'],lL=K['ArrowLeft'],lR=K['ArrowRight'];
  const boost=boostFrames>0;
  if(boostFrames>0) boostFrames--;
  const ang=bikeAngle(), ax=Math.cos(ang), px=-Math.sin(ang), py=Math.cos(ang);
  const dF=(boost?BOOST_SPD*0.06:DRIVE_F)/SUBSTEPS, bF=BACK_F/SUBSTEPS, lF=LEAN_T/SUBSTEPS;

  for(let s=0;s<SUBSTEPS;s++){
    fw.vy+=G/SUBSTEPS; rw.vy+=G/SUBSTEPS;
    if(goF){ fw.vx+=ax*dF; rw.vx+=ax*dF; }
    if(goB){ fw.vx-=ax*bF; rw.vx-=ax*bF; }
    if(lL){ fw.vx-=px*lF; fw.vy-=py*lF; rw.vx+=px*lF; rw.vy+=py*lF; }
    if(lR){ fw.vx+=px*lF; fw.vy+=py*lF; rw.vx-=px*lF; rw.vy-=py*lF; }
    const onG=fw.onGround||rw.onGround, drag=onG?GROUND_FRIC:AIR_DRAG;
    fw.vx*=drag; rw.vx*=drag;
    if(!onG){ fw.vy*=AIR_DRAG; rw.vy*=AIR_DRAG; }
    const cap=boost?BOOST_SPD:MAX_SPD;
    if(fw.vx>cap) fw.vx=cap; if(rw.vx>cap) rw.vx=cap;
    if(fw.vx<-8)  fw.vx=-8;  if(rw.vx<-8)  rw.vx=-8;
    fw.x+=fw.vx/SUBSTEPS; fw.y+=fw.vy/SUBSTEPS;
    rw.x+=rw.vx/SUBSTEPS; rw.y+=rw.vy/SUBSTEPS;
    constrainAxle(); resolveWheel(fw); resolveWheel(rw); constrainAxle();
    const avg=(fw.vx+rw.vx)/2;
    fw.spin+=avg/WHEEL_R/SUBSTEPS; rw.spin+=avg/WHEEL_R/SUBSTEPS;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────────────────────────────────────
let energy=ENERGY_MAX, distance=0, highScore=0, camX=0;
let gameState='playing', particles=[], flash=0, boostVfx=0, newBest=false;
let coins=0;   // collected energy boxes count (shown as coins)

function spawnParts(wx,wy,color,n,spd) {
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=(0.5+Math.random())*spd;
    particles.push({x:wx,y:wy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,
                    life:1,decay:0.025+Math.random()*0.04,r:3+Math.random()*4,color});
  }
}
function die(reason) {
  if(crashed) return; crashed=true;
  if(distance>highScore){ highScore=distance; newBest=true; }
  gameState='dead';
  spawnParts(bikeCenterX(),bikeCenterY(),reason==='crash'?'#ff3300':'#ff9900',35,7);
  flash=28;
}
function restart() {
  energy=ENERGY_MAX; distance=0; coins=0;
  newBest=false; gameState='playing';
  particles=[]; flash=0; boostVfx=0;
  initTerrain(); initBike();
  camX=fw.x-canvas.width*0.33;
}
window.addEventListener('keydown', e=>{
  if((e.code==='Space'||e.code==='Enter') && gameState==='dead') restart();
});

// ─────────────────────────────────────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────────────────────────────────────
function update() {
  if(gameState!=='playing'){ deadFrames++; return; }
  stepPhysics();
  const cx=bikeCenterX(), cy=bikeCenterY();

  // Energy
  const moving=Math.abs((fw.vx+rw.vx)/2)>0.3;
  energy-=ENERGY_DRAIN*(moving?1:0.4);
  if(K['ArrowUp']) energy-=ENERGY_DRAIN*0.8;
  energy=Math.max(0,energy);
  if(energy<=0){ die('energy'); return; }

  // Distance
  const d=cx*M_PER_PX;
  if(d>distance) distance=d;
  if(distance>highScore) highScore=distance;

  // Coin/energy boxes
  for(const b of ebox){
    if(!b.collected && Math.abs(cx-b.wx)<38){
      b.collected=true; coins++;
      energy=Math.min(ENERGY_MAX, energy+40+Math.random()*15);
      spawnParts(cx,cy-40,'#FFD700',20,5);
      flash=7;
    }
  }

  // Speed ramp
  for(const r of ramps){
    if(r.type!=='speed'||boostFrames>0) continue;
    const mid=r.x+r.width/2;
    if(Math.abs(cx-mid)<r.width*0.55 && (fw.onGround||rw.onGround)){
      const ry=rampY(r,cx);
      if(ry!==null){
        boostFrames=BOOST_DUR;
        fw.vx=rw.vx=Math.max(fw.vx,BOOST_SPD*0.65);
        boostVfx=55; spawnParts(cx,cy,'#FFD700',22,6); break;
      }
    }
  }

  // Crash
  const ang=bikeAngle();
  let norm=((ang%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  if(norm>Math.PI) norm=Math.PI*2-norm;
  if(norm>Math.PI*0.60 && (fw.onGround||rw.onGround)){ die('crash'); return; }

  if(boostVfx>0) boostVfx--;
  extendTerrain(camX);
}
function updateParticles() {
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=G*0.45; p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
}
function updateCamera() {
  const tx=bikeCenterX()-canvas.width*0.33;
  camX+=(tx-camX)*0.09;
}
const sX=wx=>wx-camX;

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – BACKGROUND
// ─────────────────────────────────────────────────────────────────────────────
function drawSky() {
  // Sky gradient
  const sky=ctx.createLinearGradient(0,0,0,canvas.height*0.72);
  sky.addColorStop(0,  '#4AA8E8');
  sky.addColorStop(0.5,'#78C8F8');
  sky.addColorStop(1,  '#B8E4FF');
  ctx.fillStyle=sky; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Sun
  const sunX=canvas.width*0.78, sunY=canvas.height*0.12;
  const sunGlow=ctx.createRadialGradient(sunX,sunY,8,sunX,sunY,70);
  sunGlow.addColorStop(0,'rgba(255,240,120,0.55)');
  sunGlow.addColorStop(1,'rgba(255,240,120,0)');
  ctx.fillStyle=sunGlow; ctx.beginPath(); ctx.arc(sunX,sunY,70,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFE94A';
  ctx.beginPath(); ctx.arc(sunX,sunY,22,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFF176';
  ctx.beginPath(); ctx.arc(sunX-5,sunY-5,10,0,Math.PI*2); ctx.fill();
}

function drawClouds() {
  ctx.fillStyle='rgba(255,255,255,0.88)';
  for(let i=0;i<10;i++){
    const wx = seededRand(i*13.7)*6000 + i*450;
    const cloudScreenX = ((wx - camX*0.06) % (canvas.width+300) + canvas.width+300) % (canvas.width+300) - 80;
    const y  = seededRand(i*7.1)*canvas.height*0.28 + 22;
    const sc = 0.8+seededRand(i*5.3)*0.7;
    ctx.beginPath();
    ctx.arc(cloudScreenX,        y,         sc*22,0,Math.PI*2);
    ctx.arc(cloudScreenX+sc*28,  y-sc*8,    sc*17,0,Math.PI*2);
    ctx.arc(cloudScreenX-sc*22,  y-sc*5,    sc*15,0,Math.PI*2);
    ctx.arc(cloudScreenX+sc*48,  y+sc*3,    sc*13,0,Math.PI*2);
    ctx.fill();
  }
}

function drawMountainLayer(parallax, col1, col2, freqA, freqB, ampA, ampB, baseH) {
  const baseY = canvas.height*baseH;
  const offX  = camX*parallax;
  const step  = 6;

  ctx.beginPath();
  ctx.moveTo(0, canvas.height);
  for(let sx=0; sx<=canvas.width+step; sx+=step){
    const wx = sx+offX;
    const y  = baseY
      - Math.abs(Math.sin(wx*freqA)*ampA)
      - Math.abs(Math.sin(wx*freqB)*ampB);
    ctx.lineTo(sx, y);
  }
  ctx.lineTo(canvas.width, canvas.height);
  ctx.closePath();

  const g=ctx.createLinearGradient(0,baseY-ampA-ampB,0,canvas.height*0.72);
  g.addColorStop(0, col1);
  g.addColorStop(1, col2);
  ctx.fillStyle=g; ctx.fill();
}

function drawBackground() {
  drawSky();
  drawClouds();
  // Far mountains – pale blue
  drawMountainLayer(0.04, '#A8BFCA','#94AFBE', 0.0028,0.0055,  80,40, 0.70);
  // Mid mountains – muted green
  drawMountainLayer(0.10, '#5F8A48','#4A7035', 0.0045,0.0090,  70,35, 0.75);
  // Near hills – dark green
  drawMountainLayer(0.22, '#3D7028','#2E5A1C', 0.0080,0.0160,  55,28, 0.80);
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – TERRAIN
// ─────────────────────────────────────────────────────────────────────────────
function drawTerrain() {
  const m   = 80;
  const pts = terrPts.filter(p=>p.x>=camX-m && p.x<=camX+canvas.width+m);
  if(pts.length<2) return;

  // Ground fill
  ctx.beginPath();
  ctx.moveTo(sX(pts[0].x), pts[0].y);
  for(const p of pts) ctx.lineTo(sX(p.x),p.y);
  ctx.lineTo(sX(pts[pts.length-1].x), canvas.height+10);
  ctx.lineTo(sX(pts[0].x),            canvas.height+10);
  ctx.closePath();
  const tg=ctx.createLinearGradient(0,canvas.height*0.5,0,canvas.height);
  tg.addColorStop(0,   '#4CB522');
  tg.addColorStop(0.07,'#3D9A1A');
  tg.addColorStop(0.22,'#6B4A2A');
  tg.addColorStop(1,   '#3E2810');
  ctx.fillStyle=tg; ctx.fill();

  // Bright grass strip on surface
  ctx.beginPath();
  ctx.moveTo(sX(pts[0].x), pts[0].y);
  for(const p of pts) ctx.lineTo(sX(p.x), p.y);
  ctx.strokeStyle='#6ECC28'; ctx.lineWidth=4; ctx.stroke();

  // Darker edge outline
  ctx.strokeStyle='#3A9018'; ctx.lineWidth=1.5; ctx.stroke();

  // Static grass tufts
  ctx.lineWidth=1.5;
  for(let i=0;i<pts.length;i+=4){
    const p=pts[i], ang=getTerrainAngle(p.x);
    ctx.save(); ctx.translate(sX(p.x),p.y); ctx.rotate(ang);
    ctx.strokeStyle='#5DC020';
    for(let j=-1;j<=1;j++){
      const h=5+seededRand(p.x*0.1+j*7.3)*4;
      ctx.beginPath(); ctx.moveTo(j*3,0); ctx.lineTo(j*3.5-1,-h); ctx.stroke();
    }
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – TREES & ROCKS
// ─────────────────────────────────────────────────────────────────────────────
function drawTree(scrX, gy, h, thick) {
  // Trunk
  ctx.fillStyle='#7B4F2E';
  ctx.fillRect(scrX-2, gy-h*0.28, 4, h*0.28+1);

  // Three stacked triangle layers of foliage
  const shades=['#2A7A0A','#34980E','#236608'];
  for(let i=0;i<3;i++){
    const topY = gy - h*0.24 - i*h*0.26;
    const hw   = thick*(0.9-i*0.22)*0.5;
    const bot  = gy - h*0.10 - i*h*0.20;
    ctx.fillStyle=shades[i];
    ctx.beginPath();
    ctx.moveTo(scrX,      topY);
    ctx.lineTo(scrX-hw,   bot);
    ctx.lineTo(scrX+hw,   bot);
    ctx.closePath();
    ctx.fill();
  }
}

function drawRock(scrX, gy, w, h) {
  ctx.fillStyle='#8A8A8A';
  ctx.beginPath(); ctx.ellipse(scrX, gy-h*0.5, w*0.5, h*0.5, 0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#7A7A7A';
  ctx.beginPath(); ctx.ellipse(scrX, gy-h*0.5, w*0.5, h*0.5, 0.15, 0, Math.PI*2); ctx.stroke();
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.ellipse(scrX-w*0.15, gy-h*0.72, w*0.18, h*0.18, 0, 0, Math.PI*2); ctx.fill();
}

function drawDecorations() {
  const lx=camX-80, rx=camX+canvas.width+80;

  // Trees (drawn behind ramps)
  for(const t of trees){
    if(t.x<lx||t.x>rx) continue;
    const gy=groundY(t.x);
    drawTree(sX(t.x), gy, t.h, t.thick);
  }

  // Rocks
  for(const r of rocks){
    if(r.x<lx||r.x>rx) continue;
    const gy=groundY(r.x);
    drawRock(sX(r.x), gy, r.w, r.h);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – SPEED RAMPS
// ─────────────────────────────────────────────────────────────────────────────
function drawRamps() {
  for(const r of ramps){
    const rsx=sX(r.x);
    if(rsx>canvas.width+120||rsx+r.width<-20) continue;

    ctx.beginPath();
    let started=false;
    for(let i=0;i<=24;i++){
      const t=i/24, wx=r.x+t*r.width, ry=rampY(r,wx);
      if(ry===null) continue;
      if(!started){ctx.moveTo(sX(wx),ry);started=true;}
      else ctx.lineTo(sX(wx),ry);
    }
    const by=getTerrainY(r.x+r.width*0.5);
    ctx.lineTo(sX(r.x+r.width),by); ctx.lineTo(sX(r.x),by);
    ctx.closePath();
    const g=ctx.createLinearGradient(rsx,0,rsx+r.width,0);
    g.addColorStop(0,'#E05000'); g.addColorStop(1,'#FFCC00');
    ctx.fillStyle=g; ctx.strokeStyle='#FF8800'; ctx.lineWidth=2; ctx.fill(); ctx.stroke();

    // ⚡ label
    ctx.fillStyle='#fff'; ctx.font='bold 15px sans-serif'; ctx.textAlign='center';
    ctx.shadowColor='#FF6600'; ctx.shadowBlur=8;
    ctx.fillText('⚡', sX(r.x+r.width*0.5), getTerrainY(r.x+r.width*0.5)-r.height*0.5-5);
    ctx.shadowBlur=0;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – COINS (energy boxes)
// ─────────────────────────────────────────────────────────────────────────────
function drawCoins() {
  const t=performance.now()*0.0025;
  for(const b of ebox){
    if(b.collected) continue;
    const bsx=sX(b.wx);
    if(bsx<-44||bsx>canvas.width+44) continue;
    const gy=groundY(b.wx)-44+Math.sin(t+b.wx*0.008)*5;

    ctx.save(); ctx.translate(bsx,gy);

    // Outer glow
    const glow=ctx.createRadialGradient(0,0,3,0,0,24);
    glow.addColorStop(0,'rgba(255,210,0,0.5)'); glow.addColorStop(1,'rgba(255,210,0,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,24,0,Math.PI*2); ctx.fill();

    // Coin body
    ctx.fillStyle='#FFD700';
    ctx.strokeStyle='#CC8800'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.fill(); ctx.stroke();

    // Inner shine
    ctx.fillStyle='#FFEF70';
    ctx.beginPath(); ctx.arc(-3,-3,6,0,Math.PI*2); ctx.fill();

    // $ symbol
    ctx.fillStyle='#996600'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('$',1,4);

    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – BIKE (mountain bike style, bright colors)
// ─────────────────────────────────────────────────────────────────────────────
function drawWheel(wx_, wy_, spin, r) {
  ctx.save(); ctx.translate(wx_,wy_);
  // Tyre (black)
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.strokeStyle='#222'; ctx.lineWidth=4; ctx.stroke();
  // Rim
  ctx.beginPath(); ctx.arc(0,0,r*0.62,0,Math.PI*2);
  ctx.strokeStyle='#CCC'; ctx.lineWidth=2; ctx.stroke();
  // Spokes
  ctx.strokeStyle='#AAA'; ctx.lineWidth=1.2;
  for(let i=0;i<6;i++){
    const a=spin+i*Math.PI/3;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*3,Math.sin(a)*3);
    ctx.lineTo(Math.cos(a)*r*0.88,Math.sin(a)*r*0.88);
    ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(0,0,3.5,0,Math.PI*2); ctx.fillStyle='#AAA'; ctx.fill();
  ctx.restore();
}

function drawBike() {
  const fsx=sX(fw.x), fsy=fw.y, rsx=sX(rw.x), rsy=rw.y;
  const ang=Math.atan2(fsy-rsy,fsx-rsx);
  const cx_=(fsx+rsx)/2, cy_=(fsy+rsy)/2;

  // Boost glow
  if(boostFrames>0){
    const bt=boostFrames/BOOST_DUR;
    const gr=ctx.createRadialGradient(cx_,cy_,5,cx_,cy_,75);
    gr.addColorStop(0,`rgba(255,200,0,${bt*0.4})`); gr.addColorStop(1,'rgba(255,200,0,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(cx_,cy_,75,0,Math.PI*2); ctx.fill();
    // Speed lines
    ctx.strokeStyle=`rgba(255,220,60,${bt*0.6})`; ctx.lineWidth=1.5;
    for(let i=0;i<6;i++){
      const lx=cx_-35-i*20, ly=cy_+(i%3-1)*20;
      ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx-44,ly); ctx.stroke();
    }
  }

  drawWheel(fsx,fsy,fw.spin,WHEEL_R);
  drawWheel(rsx,rsy,rw.spin,WHEEL_R);

  ctx.save(); ctx.translate(cx_,cy_); ctx.rotate(ang);

  const AD=AXLE_DIST;

  // Frame – bright orange
  ctx.strokeStyle='#FF6200'; ctx.lineWidth=3.2; ctx.lineCap='round';
  // Bottom stay
  ctx.beginPath(); ctx.moveTo(-AD/2,0); ctx.lineTo(AD/2,0); ctx.stroke();
  // Main triangle
  ctx.beginPath(); ctx.moveTo(-AD/2,0); ctx.lineTo(-2,-22); ctx.lineTo(AD/2-4,-8); ctx.stroke();
  // Seat tube
  ctx.beginPath(); ctx.moveTo(-2,-22); ctx.lineTo(-4,-34); ctx.stroke();
  // Top tube
  ctx.beginPath(); ctx.moveTo(-4,-34); ctx.lineTo(AD/2-4,-8); ctx.stroke();
  // Fork
  ctx.strokeStyle='#CC4E00'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(AD/2-4,-8); ctx.lineTo(AD/2,0); ctx.stroke();

  // Handlebar
  ctx.strokeStyle='#555'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(AD/2-11,-11); ctx.lineTo(AD/2-1,-11); ctx.stroke();

  // Seat
  ctx.strokeStyle='#333'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-10,-36); ctx.lineTo(2,-36); ctx.stroke();

  // Pedal crank
  ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(-2,-2,5,0,Math.PI*2); ctx.stroke();

  // ── Rider ──
  const SKIN='#F5C464', JERSEY='#0055CC', SHORTS='#1A1A5E';

  // Torso (jersey blue)
  ctx.strokeStyle=JERSEY; ctx.lineWidth=3.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-3,-36); ctx.lineTo(AD/2-9,-16); ctx.stroke();

  // Arms (skin)
  ctx.strokeStyle=SKIN; ctx.lineWidth=2.8;
  ctx.beginPath(); ctx.moveTo(AD/2-9,-28); ctx.lineTo(AD/2-6,-13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(AD/2-9,-28); ctx.lineTo(AD/2-11,-13); ctx.stroke();

  // Legs (shorts + skin)
  ctx.strokeStyle=SHORTS; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(-3,-36); ctx.lineTo(-9,-22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-3,-36); ctx.lineTo(3,-20); ctx.stroke();
  ctx.strokeStyle=SKIN; ctx.lineWidth=2.8;
  ctx.beginPath(); ctx.moveTo(-9,-22); ctx.lineTo(-AD/2+5,-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3,-20); ctx.lineTo(1,-4); ctx.stroke();

  // Head
  ctx.beginPath(); ctx.arc(AD/2-9,-44,9,0,Math.PI*2);
  ctx.fillStyle=SKIN; ctx.fill();

  // Helmet (bright green)
  ctx.fillStyle='#22BB00';
  ctx.beginPath(); ctx.ellipse(AD/2-9,-48,11,7,-0.1,Math.PI,0); ctx.fill();
  // Helmet strap detail
  ctx.strokeStyle='#1A9900'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(AD/2-9,-48,11,Math.PI,0); ctx.stroke();

  // Eye
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(AD/2-3,-45,2,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for(const p of particles){
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(sX(p.x),p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – HUD
// ─────────────────────────────────────────────────────────────────────────────
function hRect(x,y,w,h,r,fill,stroke,sw) {
  ctx.fillStyle=fill; ctx.roundRect(x,y,w,h,r); ctx.fill();
  if(stroke){ctx.strokeStyle=stroke; ctx.lineWidth=sw||1.5; ctx.roundRect(x,y,w,h,r); ctx.stroke();}
}

function drawHUD() {
  const PAD=14;

  // ── Energy bar ──
  const BW=185, BH=18, BX=PAD, BY=PAD;
  hRect(BX-4,BY-4, BW+92,BH+8, 7, 'rgba(255,255,255,0.75)', '#ccc');
  hRect(BX,BY, BW,BH, 4, '#e0e0e0');
  const pct=energy/ENERGY_MAX;
  const bc=pct>0.5?`hsl(${100+pct*20},80%,40%)`:pct>0.25?`hsl(${pct*120+10},85%,42%)`:'#dd2222';
  if(pct>0){
    ctx.fillStyle=bc;
    ctx.roundRect(BX,BY,BW*pct,BH,[4,pct>0.98?4:1,pct>0.98?4:1,4]); ctx.fill();
  }
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5; ctx.roundRect(BX,BY,BW,BH,4); ctx.stroke();
  ctx.fillStyle='#333'; ctx.font='bold 11px monospace'; ctx.textAlign='left';
  ctx.fillText('⚡ ENERGY', BX+BW+8, BY+13);

  // ── Coins ──
  hRect(BX-4,BY+28, 70,22, 5, 'rgba(255,255,255,0.75)', '#ccc');
  ctx.fillStyle='#996600'; ctx.font='bold 12px monospace'; ctx.textAlign='left';
  ctx.fillText(`🪙 ${coins}`, BX, BY+43);

  // ── Distance & Best – top right ──
  const RX=canvas.width-198, RY=PAD;
  hRect(RX,RY-2, 185,50, 7, 'rgba(255,255,255,0.75)', '#ccc');
  ctx.fillStyle='#446'; ctx.font='11px monospace'; ctx.textAlign='right';
  ctx.fillText('DISTANCE', canvas.width-PAD, RY+12);
  ctx.fillStyle='#112'; ctx.font='bold 22px monospace';
  ctx.fillText(`${Math.floor(distance)} m`, canvas.width-PAD, RY+34);

  hRect(RX,RY+56, 185,44, 7, 'rgba(255,255,255,0.75)', '#ccc');
  ctx.fillStyle='#885500'; ctx.font='11px monospace';
  ctx.fillText('BEST', canvas.width-PAD, RY+71);
  ctx.fillStyle='#CC7700'; ctx.font='bold 19px monospace';
  ctx.fillText(`${Math.floor(highScore)} m`, canvas.width-PAD, RY+91);

  // ── Boost bar ──
  if(boostFrames>0){
    const bt=boostFrames/BOOST_DUR, BCX=canvas.width/2;
    hRect(BCX-76,8,152,26,6,'rgba(255,255,255,0.82)','#ccc');
    ctx.fillStyle='#FF9900'; ctx.roundRect(BCX-74,10,148*bt,22,4); ctx.fill();
    ctx.fillStyle='#333'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
    ctx.fillText('⚡ SPEED BOOST',BCX,26);
  }

  // ── New best ──
  if(newBest && gameState==='dead'){
    const tw=Math.sin(performance.now()*0.005)*0.2+0.8;
    ctx.save(); ctx.globalAlpha=tw;
    ctx.fillStyle='#FF8800'; ctx.font='bold 28px monospace'; ctx.textAlign='center';
    ctx.shadowColor='#FFCC00'; ctx.shadowBlur=20;
    ctx.fillText('★  NEW BEST SCORE!  ★', canvas.width/2, canvas.height*0.24);
    ctx.shadowBlur=0; ctx.restore();
  }
}

function drawFlash() {
  if(flash<=0) return;
  ctx.save(); ctx.globalAlpha=(flash/28)*0.4;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.restore(); flash--;
}

function drawBoostVfx() {
  if(boostVfx<=0) return;
  const a=(boostVfx/55)*0.22;
  const g=ctx.createLinearGradient(0,0,canvas.width*0.5,0);
  g.addColorStop(0,`rgba(255,200,0,${a*2})`); g.addColorStop(1,'rgba(255,200,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
  boostVfx--;
}

function drawDead() {
  ctx.fillStyle='rgba(0,0,0,0.42)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/2, cy=canvas.height/2;
  hRect(cx-220,cy-115,440,230,16,'rgba(255,255,255,0.96)','#ccc',2);

  ctx.fillStyle=energy<=0?'#CC5500':'#CC2200';
  ctx.font='bold 34px monospace'; ctx.textAlign='center';
  ctx.fillText(energy<=0?'OUT OF ENERGY!':'CRASHED!', cx, cy-60);

  ctx.fillStyle='#223'; ctx.font='18px monospace';
  ctx.fillText(`Distance: ${Math.floor(distance)} m`, cx, cy-20);
  ctx.fillStyle='#885500'; ctx.font='17px monospace';
  ctx.fillText(`Best: ${Math.floor(highScore)} m`, cx, cy+8);
  ctx.fillStyle='#997700'; ctx.font='15px monospace';
  ctx.fillText(`Coins collected: ${coins}`, cx, cy+34);

  const p=1+Math.sin(performance.now()*0.005)*0.05;
  ctx.save(); ctx.translate(cx,cy+80); ctx.scale(p,p);
  hRect(-115,-23,230,44,9,'#22A040','#1A8030',2);
  ctx.fillStyle='#fff'; ctx.font='bold 15px monospace'; ctx.textAlign='center';
  ctx.fillText('SPACE / ENTER  to restart',0,5);
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  update();
  updateParticles();
  if(gameState==='playing') updateCamera();

  drawBackground();
  drawTerrain();
  drawDecorations();
  drawRamps();
  drawCoins();
  drawParticles();
  drawBike();
  drawBoostVfx();
  drawHUD();
  drawFlash();
  if(gameState==='dead') drawDead();

  requestAnimationFrame(loop);
}

restart();
loop();
</script>
</body>
</html>
