<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mountain Bike Racer</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #888;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Arial Black', 'Arial', sans-serif;
    }
    canvas { display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    #keys {
      color: #444; font-size: 12px; margin-top: 8px;
      font-family: monospace;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="keys">← → Balance &nbsp;|&nbsp; ↑ Pedal &nbsp;|&nbsp; ↓ Brake</div>
<script>
// ─────────────────────────────────────────────────────────────────────────────
//  POLYFILL – roundRect
// ─────────────────────────────────────────────────────────────────────────────
// Always override roundRect — native version does NOT call beginPath(),
// which causes all shapes to accumulate into one path (the blue-dot bug).
CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
  const rv = Array.isArray(r) ? (r[0]||0) : (r||0);
  const rc = Math.min(rv, w/2, h/2);
  this.beginPath();
  this.moveTo(x+rc, y);
  this.arcTo(x+w, y,   x+w, y+h, rc);
  this.arcTo(x+w, y+h, x,   y+h, rc);
  this.arcTo(x,   y+h, x,   y,   rc);
  this.arcTo(x,   y,   x+w, y,   rc);
  this.closePath();
  return this;
};

// ─────────────────────────────────────────────────────────────────────────────
//  CANVAS
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = Math.min(window.innerWidth,  1280);
  canvas.height = Math.min(window.innerHeight - 36, 720);
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────
const G            = 0.52;
const WHEEL_R      = 14;
const AXLE_DIST    = 58;
const DRIVE_F      = 0.50;
const BACK_F       = 0.20;
const LEAN_T       = 0.055;
const GROUND_FRIC  = 0.984;
const AIR_DRAG     = 0.9995;
const MAX_SPD      = 22;
const BOOST_SPD    = 32;
const BOOST_DUR    = 80;
const SUBSTEPS     = 5;
const RESTITUTION  = 0.08;

const ENERGY_MAX     = 100;
const ENERGY_DRAIN   = 0.038;
const BOX_INTERVAL_M = 100;
const M_PER_PX       = 0.1;
const CHUNK_W        = 900;

// ─────────────────────────────────────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────────────────────────────────────
const K = {};
window.addEventListener('keydown', e => { K[e.code]=true;  e.preventDefault(); });
window.addEventListener('keyup',   e => { K[e.code]=false; });

// ─────────────────────────────────────────────────────────────────────────────
//  NOISE / SEEDED RAND
// ─────────────────────────────────────────────────────────────────────────────
function seededRand(n) {
  const x = Math.sin(n*127.1+311.7)*43758.5453;
  return x-Math.floor(x);
}
function noisy(x, seed) {
  return Math.sin(x*0.008 +seed)       *65
       + Math.sin(x*0.021 +seed*1.7)   *30
       + Math.sin(x*0.055 +seed*3.3)   *12
       + Math.sin(x*0.14  +seed*5.1)   *5;
}

// ─────────────────────────────────────────────────────────────────────────────
//  TERRAIN
// ─────────────────────────────────────────────────────────────────────────────
let terrPts=[], chunks=[], ramps=[], ebox=[];

function smoothTerrain(pts, passes) {
  for (let p=0;p<passes;p++)
    for (let i=1;i<pts.length-1;i++)
      pts[i].y=(pts[i-1].y+pts[i].y*2+pts[i+1].y)/4;
}

function genChunk(startX, seed) {
  const BASE=canvas.height*0.58, endX=startX+CHUNK_W, pts=[];
  for (let x=startX;x<=endX;x+=10) {
    let y=BASE+noisy(x,seed);
    y=Math.min(y,canvas.height*0.85); y=Math.max(y,canvas.height*0.25);
    pts.push({x,y});
  }
  smoothTerrain(pts,3);
  if (terrPts.length>0) {
    const lastY=terrPts[terrPts.length-1].y, blend=30;
    for (let i=0;i<Math.min(blend,pts.length);i++) {
      const t=i/blend; pts[i].y=lastY*(1-t)+pts[i].y*t;
    }
  }
  terrPts.push(...pts);
  chunks.push(endX);
  // Speed ramp ~35% chance
  if (seededRand(seed*7)<0.35) {
    ramps.push({
      x:      startX+150+seededRand(seed*17)*(CHUNK_W-300),
      width:  65+seededRand(seed*3)*50,
      height: 28+seededRand(seed)*18,
      type:   'speed'
    });
  }
}

let _seed=1;
function initTerrain() {
  terrPts=[]; chunks=[]; ramps=[]; ebox=[]; _seed=1;
  const BASE=canvas.height*0.58;
  // Longer flat start (800px) so player builds speed before hitting hills
  for (let x=-300;x<=800;x+=10) terrPts.push({x,y:BASE});
  for (let i=0;i<7;i++) genChunk(800+i*CHUNK_W,++_seed);
  seedBoxes();
}
function seedBoxes() {
  for (let d=1;d<=120;d++) {
    const wx=(d*BOX_INTERVAL_M)/M_PER_PX;
    if (!ebox.find(b=>b.wx===wx)) ebox.push({wx,collected:false});
  }
}
function extendTerrain(camX) {
  const last=chunks[chunks.length-1]||0;
  if (camX+canvas.width+CHUNK_W>last) { genChunk(last,++_seed); seedBoxes(); }
  const cutoff=camX-CHUNK_W*1.5;
  let lo=0;
  while (lo<terrPts.length-2&&terrPts[lo+1].x<cutoff) lo++;
  if (lo>200) terrPts.splice(0,lo);
}
function getTerrainY(wx) {
  if (terrPts.length<2) return canvas.height*0.58;
  let lo=0,hi=terrPts.length-1;
  if (wx<=terrPts[0].x)  return terrPts[0].y;
  if (wx>=terrPts[hi].x) return terrPts[hi].y;
  while (hi-lo>1){const m=(lo+hi)>>1;if(terrPts[m].x<=wx)lo=m;else hi=m;}
  const t=(wx-terrPts[lo].x)/(terrPts[hi].x-terrPts[lo].x);
  return terrPts[lo].y+t*(terrPts[hi].y-terrPts[lo].y);
}
function getTerrainAngle(wx){return Math.atan2(getTerrainY(wx+8)-getTerrainY(wx-8),16);}
function rampY(r,wx) {
  if (wx<r.x||wx>r.x+r.width) return null;
  const t=(wx-r.x)/r.width;
  return getTerrainY(wx)-(t<0.65?(t/0.65)*r.height:((1-t)/0.35)*r.height);
}
function groundY(wx) {
  let y=getTerrainY(wx);
  for (const r of ramps){const ry=rampY(r,wx);if(ry!==null&&ry<y)y=ry;}
  return y;
}

// ─────────────────────────────────────────────────────────────────────────────
//  BIKE PHYSICS  (two-wheel Verlet)
// ─────────────────────────────────────────────────────────────────────────────
let fw,rw,boostFrames=0,crashed=false,deadFrames=0;

function initBike() {
  const sx=90,sy=getTerrainY(sx)-WHEEL_R;
  fw={x:sx+AXLE_DIST/2,y:sy,vx:0,vy:0,onGround:false,spin:0};
  rw={x:sx-AXLE_DIST/2,y:sy,vx:0,vy:0,onGround:false,spin:0};
  boostFrames=0; crashed=false; deadFrames=0;
}
function bikeAngle(){return Math.atan2(fw.y-rw.y,fw.x-rw.x);}
function bikeCenterX(){return(fw.x+rw.x)/2;}
function bikeCenterY(){return(fw.y+rw.y)/2;}

function constrainAxle(){
  const dx=fw.x-rw.x,dy=fw.y-rw.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<1e-6)return;
  const nx=dx/dist,ny=dy/dist,cor=(dist-AXLE_DIST)*0.5;
  fw.x-=nx*cor;fw.y-=ny*cor;rw.x+=nx*cor;rw.y+=ny*cor;
  const rv=(fw.vx-rw.vx)*nx+(fw.vy-rw.vy)*ny;
  fw.vx-=rv*0.5*nx;fw.vy-=rv*0.5*ny;rw.vx+=rv*0.5*nx;rw.vy+=rv*0.5*ny;
}
function resolveWheel(w){
  const gy=groundY(w.x)-WHEEL_R; w.onGround=false;
  if(w.y>=gy){
    w.y=gy;
    const ta=getTerrainAngle(w.x),nx=Math.sin(ta),ny=-Math.cos(ta);
    const vn=w.vx*nx+w.vy*ny;
    if(vn<0){w.vx-=(1+RESTITUTION)*vn*nx;w.vy-=(1+RESTITUTION)*vn*ny;}
    w.onGround=true;
  }
}
function stepPhysics(){
  const goF=K['ArrowUp'],goB=K['ArrowDown'],lL=K['ArrowLeft'],lR=K['ArrowRight'];
  const boost=boostFrames>0;
  if(boostFrames>0)boostFrames--;
  const ang=bikeAngle(),ax=Math.cos(ang),px=-Math.sin(ang),py=Math.cos(ang);
  const dF=(boost?BOOST_SPD*0.06:DRIVE_F)/SUBSTEPS,bF=BACK_F/SUBSTEPS,lF=LEAN_T/SUBSTEPS;
  for(let s=0;s<SUBSTEPS;s++){
    fw.vy+=G/SUBSTEPS;rw.vy+=G/SUBSTEPS;
    if(goF){fw.vx+=ax*dF;rw.vx+=ax*dF;}
    if(goB){fw.vx-=ax*bF;rw.vx-=ax*bF;}
    if(lL){fw.vx-=px*lF;fw.vy-=py*lF;rw.vx+=px*lF;rw.vy+=py*lF;}
    if(lR){fw.vx+=px*lF;fw.vy+=py*lF;rw.vx-=px*lF;rw.vy-=py*lF;}
    const onG=fw.onGround||rw.onGround,drag=onG?GROUND_FRIC:AIR_DRAG;
    fw.vx*=drag;rw.vx*=drag;
    if(!onG){fw.vy*=AIR_DRAG;rw.vy*=AIR_DRAG;}
    const cap=boost?BOOST_SPD:MAX_SPD;
    if(fw.vx>cap)fw.vx=cap;if(rw.vx>cap)rw.vx=cap;
    if(fw.vx<-8)fw.vx=-8;if(rw.vx<-8)rw.vx=-8;
    fw.x+=fw.vx/SUBSTEPS;fw.y+=fw.vy/SUBSTEPS;
    rw.x+=rw.vx/SUBSTEPS;rw.y+=rw.vy/SUBSTEPS;
    constrainAxle();resolveWheel(fw);resolveWheel(rw);constrainAxle();
    const avg=(fw.vx+rw.vx)/2;
    fw.spin+=avg/WHEEL_R/SUBSTEPS;rw.spin+=avg/WHEEL_R/SUBSTEPS;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────────────────────────────────────
let energy=ENERGY_MAX,distance=0,highScore=0,camX=0;
let gameState='playing',particles=[],flash=0,boostVfx=0,newBest=false;

function spawnParts(wx,wy,color,n,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=(0.5+Math.random())*spd;
    particles.push({x:wx,y:wy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,
                    life:1,decay:0.025+Math.random()*0.04,r:3+Math.random()*5,color});
  }
}
function die(reason){
  if(crashed)return; crashed=true;
  if(distance>highScore){highScore=distance;newBest=true;}
  gameState='dead';
  spawnParts(bikeCenterX(),bikeCenterY(),reason==='crash'?'#ff0000':'#ff8800',35,7);
  flash=25;
}
function restart(){
  energy=ENERGY_MAX;distance=0;
  newBest=false;gameState='playing';
  particles=[];flash=0;boostVfx=0;
  initTerrain();initBike();
  camX=fw.x-canvas.width*0.33;
}
window.addEventListener('keydown',e=>{
  if((e.code==='Space'||e.code==='Enter')&&gameState==='dead')restart();
});

// ─────────────────────────────────────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────────────────────────────────────
function update(){
  if(gameState!=='playing'){deadFrames++;return;}
  stepPhysics();
  const cx=bikeCenterX(),cy=bikeCenterY();
  const moving=Math.abs((fw.vx+rw.vx)/2)>0.3;
  energy-=ENERGY_DRAIN*(moving?1:0.4);
  if(K['ArrowUp'])energy-=ENERGY_DRAIN*0.8;
  energy=Math.max(0,energy);
  if(energy<=0){die('energy');return;}
  const d=cx*M_PER_PX;
  if(d>distance)distance=d;
  if(distance>highScore)highScore=distance;
  // Energy pickups
  for(const b of ebox){
    if(!b.collected&&Math.abs(cx-b.wx)<38){
      b.collected=true;
      energy=Math.min(ENERGY_MAX,energy+40+Math.random()*15);
      spawnParts(cx,cy-40,'#00ff44',18,4);
      flash=6;
    }
  }
  // Speed ramp
  for(const r of ramps){
    if(r.type!=='speed'||boostFrames>0)continue;
    const mid=r.x+r.width/2;
    if(Math.abs(cx-mid)<r.width*0.55&&(fw.onGround||rw.onGround)){
      const ry=rampY(r,cx);
      if(ry!==null){
        boostFrames=BOOST_DUR;
        fw.vx=rw.vx=Math.max(fw.vx,BOOST_SPD*0.65);
        boostVfx=55;spawnParts(cx,cy,'#ffdd00',22,6);break;
      }
    }
  }
  // Crash detection
  const ang=bikeAngle();
  let norm=((ang%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  if(norm>Math.PI)norm=Math.PI*2-norm;
  if(norm>Math.PI*0.60&&(fw.onGround||rw.onGround)){die('crash');return;}
  if(boostVfx>0)boostVfx--;
  extendTerrain(camX);
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=G*0.45;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}
function updateCamera(){
  const tx=bikeCenterX()-canvas.width*0.33;
  camX+=(tx-camX)*0.09;
}
const sX=wx=>wx-camX;

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – BACKGROUND
//  Static checkerboard – exact tile colors from game (#868688 / #7a7a7c).
//  No parallax: the real game's TiledBackground is viewport-fixed.
// ─────────────────────────────────────────────────────────────────────────────
function drawBackground(){
  const sq = 125;
  for(let row=0; row*sq < canvas.height+sq; row++){
    for(let col=0; col*sq < canvas.width+sq; col++){
      ctx.fillStyle = (row+col)%2===0 ? '#868688' : '#7a7a7c';
      ctx.fillRect(col*sq, row*sq, sq, sq);
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – TERRAIN  (pure black fill, bright green surface line – matches game)
// ─────────────────────────────────────────────────────────────────────────────
function drawTerrain(){
  const m=80;
  const pts=terrPts.filter(p=>p.x>=camX-m&&p.x<=camX+canvas.width+m);
  if(pts.length<2)return;

  // Pure black ground (matches ground_tiled sprite: rgb(0,0,0))
  ctx.beginPath();
  ctx.moveTo(sX(pts[0].x),pts[0].y);
  for(const p of pts)ctx.lineTo(sX(p.x),p.y);
  ctx.lineTo(sX(pts[pts.length-1].x),canvas.height+10);
  ctx.lineTo(sX(pts[0].x),canvas.height+10);
  ctx.closePath();
  ctx.fillStyle='#000';ctx.fill();

  // Bright green surface line
  ctx.beginPath();
  ctx.moveTo(sX(pts[0].x),pts[0].y);
  for(const p of pts)ctx.lineTo(sX(p.x),p.y);
  ctx.strokeStyle='#2ecc40';ctx.lineWidth=6;ctx.lineJoin='round';ctx.stroke();
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – SPEED RAMPS  (yellow/orange ramp, bold border)
// ─────────────────────────────────────────────────────────────────────────────
function drawRamps(){
  for(const r of ramps){
    const rsx=sX(r.x);
    if(rsx>canvas.width+120||rsx+r.width<-20)continue;
    ctx.beginPath();
    let started=false;
    for(let i=0;i<=24;i++){
      const t=i/24,wx=r.x+t*r.width,ry=rampY(r,wx);
      if(ry===null)continue;
      if(!started){ctx.moveTo(sX(wx),ry);started=true;}
      else ctx.lineTo(sX(wx),ry);
    }
    const by=getTerrainY(r.x+r.width*0.5);
    ctx.lineTo(sX(r.x+r.width),by);ctx.lineTo(sX(r.x),by);ctx.closePath();
    ctx.fillStyle='#FFD700';ctx.strokeStyle='#FF8C00';ctx.lineWidth=3;
    ctx.fill();ctx.stroke();
    // "BOOST" label
    ctx.fillStyle='#000';ctx.font='bold 11px Arial Black';ctx.textAlign='center';
    ctx.fillText('BOOST',sX(r.x+r.width*0.5),getTerrainY(r.x+r.width*0.5)-r.height*0.5-4);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – ENERGY PICKUPS
//  Matches sheet1: black rectangle box + bright green (#00FF00) lightning bolt
// ─────────────────────────────────────────────────────────────────────────────
function drawEnergyBoxes(){
  const t=performance.now()*0.002;
  for(const b of ebox){
    if(b.collected)continue;
    const bsx=sX(b.wx);
    if(bsx<-44||bsx>canvas.width+44)continue;
    const gy=groundY(b.wx)-42+Math.sin(t+b.wx*0.008)*5;
    ctx.save(); ctx.translate(bsx,gy);
    // Black box (matches game sprite exactly)
    ctx.fillStyle='#000';
    ctx.fillRect(-16,-22,32,36);
    // Bright green bolt (exactly #00FF00 as in sheet1)
    ctx.fillStyle='#00FF00';
    ctx.beginPath();
    ctx.moveTo(3,-18); ctx.lineTo(-7,2); ctx.lineTo(0,2);
    ctx.lineTo(-3,18); ctx.lineTo(8,0);  ctx.lineTo(1,0);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – WHEEL  (matches actual WHEEL sprite: black circle, 4 crosshair spokes)
// ─────────────────────────────────────────────────────────────────────────────
function drawWheel(wx_,wy_,spin,r){
  ctx.save(); ctx.translate(wx_,wy_);
  // Thick black tyre
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill();
  // White inner area
  ctx.beginPath(); ctx.arc(0,0,r*0.72,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  // 4 crosshair spokes (horizontal + vertical, as in sprite)
  ctx.strokeStyle='#000'; ctx.lineWidth=Math.max(3, r*0.22);
  for(let i=0;i<4;i++){
    const a = spin + i*Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*r*0.92, Math.sin(a)*r*0.92);
    ctx.stroke();
  }
  // Hub circle
  ctx.beginPath(); ctx.arc(0,0,r*0.18,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill();
  ctx.restore();
}

// Draw a red capsule (pill shape) – used for every rider body part
function redCapsule(x, y, w, h, angle){
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle='#FF0000';
  const r = w/2;
  ctx.beginPath();
  ctx.arc(0, -(h/2-r), r, Math.PI, 0);
  ctx.lineTo(r, h/2-r);
  ctx.arc(0, h/2-r, r, 0, Math.PI);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – BIKE + RIDER
//  Precisely matches actual sprite assets:
//   body_bike:  black triangular frame with large rear-axle circle
//   WHEEL:      black circle, 4 thick crosshair spokes, white rim area
//   bodi_rider: red tall capsule
//   legs/arms:  red narrow capsules
//   head:       red circle
//   shoes:      black teardrop
// ─────────────────────────────────────────────────────────────────────────────
function drawBike(){
  const fsx=sX(fw.x), fsy=fw.y;
  const rsx=sX(rw.x), rsy=rw.y;
  const ang=Math.atan2(fsy-rsy, fsx-rsx);
  const cx_=(fsx+rsx)/2, cy_=(fsy+rsy)/2;
  const AD=AXLE_DIST;

  // ── Boost vfx ──
  if(boostFrames>0){
    const bt=boostFrames/BOOST_DUR;
    ctx.save(); ctx.globalAlpha=bt*0.30;
    ctx.fillStyle='#ffdd00';
    ctx.beginPath(); ctx.arc(cx_,cy_,90,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.strokeStyle=`rgba(255,220,0,${bt*0.8})`; ctx.lineWidth=4;
    for(let i=0;i<5;i++){
      const ly=cy_+(i-2)*20;
      ctx.beginPath(); ctx.moveTo(cx_-50,ly); ctx.lineTo(cx_-90-i*14,ly); ctx.stroke();
    }
  }

  // ── Wheels ──
  drawWheel(fsx,fsy,fw.spin,WHEEL_R);
  drawWheel(rsx,rsy,rw.spin,WHEEL_R);

  ctx.save(); ctx.translate(cx_,cy_); ctx.rotate(ang);

  // ── Bike frame – matches body_bike sprite exactly ──
  // The sprite shows: long top tube + diagonal down tube + large rear circle + head tube rect
  ctx.fillStyle='#000'; ctx.strokeStyle='#000';
  ctx.lineCap='round'; ctx.lineJoin='round';

  // Down tube: long diagonal from front head-tube area diagonally to rear axle
  ctx.lineWidth=9;
  ctx.beginPath(); ctx.moveTo(AD/2-4, -6); ctx.lineTo(-AD/2+2, 2); ctx.stroke();

  // Top tube: horizontal bar from seat tube to head tube
  ctx.lineWidth=9;
  ctx.beginPath(); ctx.moveTo(-AD*0.12,-26); ctx.lineTo(AD/2-4,-26); ctx.stroke();

  // Seat tube (near-vertical)
  ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(-AD*0.12,-2); ctx.lineTo(-AD*0.12,-28); ctx.stroke();

  // Seat stay (diagonal from seat junction to rear axle)
  ctx.lineWidth=7;
  ctx.beginPath(); ctx.moveTo(-AD*0.12,-26); ctx.lineTo(-AD/2+2, 0); ctx.stroke();

  // Fork (from head tube down to front axle)
  ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(AD/2-4,-26); ctx.lineTo(AD/2,0); ctx.stroke();

  // Head tube (thick vertical rectangle at front – matches sprite)
  ctx.fillRect(AD/2-12,-36, 14, 36);

  // Seat post (above seat tube junction)
  ctx.lineWidth=7;
  ctx.beginPath(); ctx.moveTo(-AD*0.12,-28); ctx.lineTo(-AD*0.12,-38); ctx.stroke();

  // Seat (horizontal bar)
  ctx.lineWidth=9;
  ctx.beginPath(); ctx.moveTo(-AD*0.28,-40); ctx.lineTo(AD*0.02,-40); ctx.stroke();

  // Handlebar stem
  ctx.lineWidth=7;
  ctx.beginPath(); ctx.moveTo(AD/2-5,-36); ctx.lineTo(AD/2-5,-50); ctx.stroke();

  // Handlebar (horizontal – matches sprite)
  ctx.lineWidth=9;
  ctx.beginPath(); ctx.moveTo(AD/2-18,-52); ctx.lineTo(AD/2+6,-52); ctx.stroke();

  // Rear axle hub (large filled circle – the distinctive circle in the sprite)
  ctx.beginPath(); ctx.arc(-AD/2, 0, 9, 0, Math.PI*2); ctx.fill();

  // ── Rider – all pure #FF0000 capsules, exactly as in the game sprites ──

  // Leg cycling: use wheel spin for phase but keep displacement tiny
  // so legs stay near the body and just swing, never orbit or dislocate.
  const phase = fw.spin;   // advances with wheel rotation
  const swA = Math.sin(phase) * 0.32;   // max ±18° swing
  const swB = Math.sin(phase + Math.PI) * 0.32;
  const hipX = -AD*0.06, hipY = -18;

  // Leg 1
  redCapsule(hipX + Math.sin(swA)*4,  hipY + Math.cos(swA)*3,  10, 30, swA);
  // Leg 2
  redCapsule(hipX + Math.sin(swB)*4,  hipY + Math.cos(swB)*3,  10, 30, swB);

  // Body (tall red capsule – bodi_rider sprite)
  redCapsule(-AD*0.12, -42, 22, 48, 0);

  // Arms (red capsules reaching toward handlebar)
  redCapsule(AD*0.04, -44, 9, 26, 0.5);
  redCapsule(AD*0.12, -42, 9, 24, 0.3);

  // Head (red circle – head sprite)
  ctx.beginPath(); ctx.arc(-AD*0.08, -70, 13, 0, Math.PI*2);
  ctx.fillStyle='#FF0000'; ctx.fill();

  // Black shoes – fixed small ovals near leg tips (no orbit)
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(hipX + Math.sin(swA)*4 + Math.sin(swA)*12,
              hipY + Math.cos(swA)*3 + 14, 8, 4, swA, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(hipX + Math.sin(swB)*4 + Math.sin(swB)*12,
              hipY + Math.cos(swB)*3 + 14, 8, 4, swB, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – PARTICLES
// ─────────────────────────────────────────────────────────────────────────────
function drawParticles(){
  for(const p of particles){
    ctx.save();ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(sX(p.x),p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – HUD  (flat, bold, matching game's UI palette)
// ─────────────────────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.save();
  ctx.textBaseline='alphabetic';
  const PAD=12;

  // ── Battery energy bar (top-left) ──
  // Use fillRect throughout – no roundRect path issues
  const BX=PAD, BY=PAD, BW=160, BH=22;
  // White outline so bar is always visible against any background
  ctx.fillStyle='#fff';       ctx.fillRect(BX-2,BY-2, BW+11, BH+4);
  // Black shell
  ctx.fillStyle='#111';       ctx.fillRect(BX,BY, BW,BH);
  // Battery nub
  ctx.fillStyle='#111';       ctx.fillRect(BX+BW, BY+6, 5, 10);
  // Coloured fill
  const pct=energy/ENERGY_MAX;
  const barFill = pct>0.5 ? '#2ecc40' : pct>0.25 ? '#ffaa00' : '#ee0000';
  if(pct>0.004){
    ctx.fillStyle=barFill;
    ctx.fillRect(BX+2, BY+2, Math.max(0,(BW-4)*pct), BH-4);
  }
  // "ENERGY" label
  ctx.fillStyle='#111'; ctx.font='bold 11px Arial Black'; ctx.textAlign='left';
  ctx.fillText('ENERGY', BX+BW+10, BY+15);

  // ── Distance counter (top-right) ──
  const DW=170, DX=canvas.width-DW-PAD, DY=PAD;
  ctx.fillStyle='#fff'; ctx.fillRect(DX-2,DY-2, DW+4, 32);
  ctx.fillStyle='#111'; ctx.fillRect(DX, DY, DW, 30);
  ctx.fillStyle='#2ecc40'; ctx.font='bold 10px Arial Black'; ctx.textAlign='left';
  ctx.fillText('DISTANCE', DX+8, DY+11);
  ctx.fillStyle='#fff'; ctx.font='bold 18px Arial Black';
  ctx.fillText(`${Math.floor(distance)} m`, DX+8, DY+27);

  // ── Best score ──
  const BestX=DX, BestY=DY+38;
  ctx.fillStyle='#fff'; ctx.fillRect(BestX-2,BestY-2, DW+4, 30);
  ctx.fillStyle='#111'; ctx.fillRect(BestX, BestY, DW, 28);
  ctx.fillStyle='#ffdd00'; ctx.font='bold 10px Arial Black'; ctx.textAlign='left';
  ctx.fillText('BEST', BestX+8, BestY+11);
  ctx.fillStyle='#ffdd00'; ctx.font='bold 16px Arial Black';
  ctx.fillText(`${Math.floor(highScore)} m`, BestX+8, BestY+25);

  // ── Boost bar (centre top) ──
  if(boostFrames>0){
    const bt=boostFrames/BOOST_DUR, BCX=canvas.width/2;
    ctx.fillStyle='#fff'; ctx.fillRect(BCX-82,6, 164,28);
    ctx.fillStyle='#111'; ctx.fillRect(BCX-80,8, 160,24);
    ctx.fillStyle='#FFD700'; ctx.fillRect(BCX-78,10, 156*bt,20);
    ctx.fillStyle='#000'; ctx.font='bold 11px Arial Black'; ctx.textAlign='center';
    ctx.fillText('⚡ SPEED BOOST', BCX, 26);
  }

  // ── New best banner ──
  if(newBest&&gameState==='dead'){
    const tw=Math.sin(performance.now()*0.005)*0.2+0.8;
    ctx.globalAlpha=tw;
    ctx.fillStyle='#FFD700'; ctx.font='bold 30px Arial Black'; ctx.textAlign='center';
    ctx.strokeStyle='#000'; ctx.lineWidth=4;
    ctx.strokeText('★ NEW BEST SCORE! ★', canvas.width/2, canvas.height*0.22);
    ctx.fillText ('★ NEW BEST SCORE! ★', canvas.width/2, canvas.height*0.22);
  }

  ctx.restore();
}

function drawFlash(){
  if(flash<=0)return;
  ctx.save();ctx.globalAlpha=(flash/25)*0.45;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.restore();flash--;
}

function drawBoostVfx(){
  if(boostVfx<=0)return;
  const a=(boostVfx/55)*0.2;
  const g=ctx.createLinearGradient(0,0,canvas.width*0.4,0);
  g.addColorStop(0,`rgba(255,215,0,${a*2})`);
  g.addColorStop(1,'rgba(255,215,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  boostVfx--;
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW – GAME OVER SCREEN  (bold flat style matching the game's UI)
// ─────────────────────────────────────────────────────────────────────────────
function drawDead(){
  ctx.save();
  ctx.textBaseline='alphabetic';

  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/2, cy=canvas.height/2;

  // Panel – use fillRect/strokeRect, not roundRect, to avoid any path issue
  ctx.fillStyle='#111';   ctx.fillRect(cx-200,cy-110,400,220);
  ctx.strokeStyle='#444'; ctx.lineWidth=2;
  ctx.strokeRect(cx-200,cy-110,400,220);

  // Title
  ctx.fillStyle=energy<=0?'#ffaa00':'#ff0000';
  ctx.font='bold 32px Arial Black'; ctx.textAlign='center';
  ctx.fillText(energy<=0?'OUT OF ENERGY':'CRASHED!', cx, cy-62);

  // Stats
  ctx.fillStyle='#fff'; ctx.font='bold 18px Arial Black';
  ctx.fillText(`${Math.floor(distance)} m`, cx, cy-22);
  ctx.fillStyle='#aaa'; ctx.font='14px Arial';
  ctx.fillText('distance', cx, cy-4);
  ctx.fillStyle='#FFD700'; ctx.font='bold 16px Arial Black';
  ctx.fillText(`BEST: ${Math.floor(highScore)} m`, cx, cy+22);

  // Restart button (blue rectangle – matches game's BTN_GO sprite color)
  const pulse=1+Math.sin(performance.now()*0.005)*0.04;
  const bw=220, bh=44, bx=cx-bw/2*pulse, by=(cy+50)*1-bh/2*pulse;
  ctx.fillStyle='#0077EE';
  ctx.fillRect(cx-bw/2, cy+50, bw, bh);
  ctx.strokeStyle='#005ab5'; ctx.lineWidth=3;
  ctx.strokeRect(cx-bw/2, cy+50, bw, bh);
  ctx.fillStyle='#fff'; ctx.font='bold 16px Arial Black'; ctx.textAlign='center';
  ctx.fillText('R  RESTART GAME', cx, cy+50+bh*0.62);

  ctx.fillStyle='#888'; ctx.font='12px Arial';
  ctx.fillText('SPACE or ENTER to restart', cx, cy+114);

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  update();
  updateParticles();
  if(gameState==='playing')updateCamera();

  drawBackground();
  drawTerrain();
  drawRamps();
  drawEnergyBoxes();
  drawParticles();
  drawBike();
  drawBoostVfx();
  drawHUD();
  drawFlash();
  if(gameState==='dead')drawDead();

  requestAnimationFrame(loop);
}

restart();
loop();
</script>
</body>
</html>
